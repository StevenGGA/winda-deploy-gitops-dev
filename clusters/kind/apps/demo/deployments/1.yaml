apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-1
  labels: { app: "demo", deployment: "1" }
spec:
  replicas: 1
  selector:
    matchLabels: { app: "demo", deployment: "1" }
  template:
    metadata:
      labels: { app: "demo", deployment: "1" }
    spec:
      containers:
        - name: demo
          image: docker.io/nginx:latest
          ports:
            - containerPort: 80
          env:
            - { name: DEPLOYMENT, value: "1" }
            - { name: PORT, value: "80" }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: demo-1
spec:
  selector: { app: "demo", deployment: "1" }
  ports:
    - port: 80
      targetPort: 80
