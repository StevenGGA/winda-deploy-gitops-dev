apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-v2
  labels: { app: demo, deployment: v2 }
spec:
  replicas: 1
  selector:
    matchLabels: { app: demo, deployment: v2 }
  template:
    metadata:
      labels: { app: demo, deployment: v2 }
    spec:
      containers:
        - name: demo
          image: docker.io/nginx:0.9.2
          ports:
            - containerPort: 80
          env:
            - { name: DEPLOYMENT, value: "v2" }
            - { name: PORT, value: "80" }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: demo-v2
spec:
  selector: { app: demo, deployment: v2 }
  ports:
    - port: 80
      targetPort: 80
