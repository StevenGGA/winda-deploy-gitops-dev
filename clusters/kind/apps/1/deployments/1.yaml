apiVersion: apps/v1
kind: Deployment
metadata:
  name: 1-1
  labels: { app: 1, deployment: 1 }
spec:
  replicas: 1
  selector:
    matchLabels: { app: 1, deployment: 1 }
  template:
    metadata:
      labels: { app: 1, deployment: 1 }
    spec:
      containers:
        - name: 1
          image: docker.io/ealen/echo-server:0.9.2
          ports:
            - containerPort: 80
          env:
            - { name: DEPLOYMENT, value: "1" }
            - { name: PORT, value: "80" }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: 1-1
spec:
  selector: { app: 1, deployment: 1 }
  ports:
    - port: 80
      targetPort: 80
